syntax = "proto3";

package zm.worker.v1;

// ============================================================================
// zm-next worker link — the single contract between a per-monitor worker
// (zm-core) and the local zm-api.
//
// Transport: one Unix domain socket per monitor,
//   ${ZM_PATH_SOCKS}/stream_{monitor_id}.sock   e.g. /run/zm/stream_7.sock
// Framing:  each wire unit is
//             u32 pb_len       (LE)  bytes of the serialized `Frame` below
//             u32 payload_len  (LE)  bytes of trailing raw payload (0 if none)
//             [pb_len]      serialized `Frame` (protobuf — metadata only)
//             [payload_len] raw media access unit / audio packet
//           Bidirectional on one connection. The bulk media payload rides
//           ALONGSIDE the protobuf, never inside it: the worker keeps the access
//           unit in a single refcounted buffer shared across all consumer queues
//           and sends header+payload with writev() — zero payload copies, and
//           protobuf only ever serializes the small metadata `Frame`. (Same
//           "length-delimited protobuf + side-payload" split gRPC uses.)
// Access:   socket mode 0660, owner = ZM user, group = configured stream group;
//           optionally restricted by SO_PEERCRED uid allow-list.
//
// Multiple consumers are supported. A slow consumer's oldest media is dropped
// (never Hello), surfaced as `sequence` gaps and in `Stats`; it never affects
// the worker or other consumers. Consumers connect with retry — the socket
// appears when the worker starts and survives camera reconnects.
//
// This supersedes the hand-rolled binary stream-socket framing on the
// ZoneMinder feature/stream-socket-events branch: identical semantics, but
// schema-first so the C++ worker and Rust API generate code from one source.
// ============================================================================

// One framed message. Length-prefixed on the wire (see Framing above).
message Frame {
  uint32 monitor_id = 1;

  // Per-stream counter of messages *produced* (including any dropped for a slow
  // consumer), so loss shows up as gaps. Event frames use their own per-monitor
  // counter. Unused (0) on client->server frames.
  uint32 sequence = 2;

  // Media epoch. A bump means stream parameters changed; a fresh `Hello`
  // follows and sequences restart. On Event frames this is the media epoch in
  // effect at emission, for correlation.
  uint32 generation = 3;

  oneof payload {
    // ---- server -> client (push) ----
    Hello    hello    = 10;
    Media    media    = 11;
    Keyframe keyframe = 12;
    Stats    stats    = 13;
    Event    event    = 14;
    Bye      bye      = 15;

    // ---- client -> server (pull) ----
    Subscribe subscribe = 30;
    Command   command   = 31;
    Talkback  talkback  = 32;

    // ---- server -> client, answering a Command ----
    Response response = 40;
  }
}

enum StreamKind {
  STREAM_KIND_UNSPECIFIED = 0;
  STREAM_KIND_VIDEO       = 1;
  STREAM_KIND_AUDIO       = 2;
  STREAM_KIND_MONITOR     = 3;  // Event frames: monitor lifecycle, not media
}

// Sent per media stream on connect and again on every generation bump. Mirrors
// the fields of an FFmpeg AVCodecParameters so a consumer can init a decoder.
message Hello {
  StreamKind stream      = 1;
  uint32     codec_id    = 2;  // AVCodecID value
  bytes      extradata   = 3;  // codecpar extradata: SPS/PPS/VPS, AudioSpecificConfig, AV1 seq-hdr OBU
  uint32     width       = 4;
  uint32     height      = 5;
  uint32     fps_num     = 6;
  uint32     fps_den     = 7;
  uint32     sample_rate = 8;
  uint32     channels    = 9;
  uint32     profile     = 10;
  uint32     level       = 11;
}

// Metadata for one complete video access unit (Annex B for H.26x) or one audio
// packet (raw — the Hello extradata removes any need for ADTS-style wrapping).
// The bytes themselves are the wire unit's trailing payload (see Framing), NOT a
// field here — so the worker shares one refcounted buffer across consumers and
// never copies the payload through protobuf.
message Media {
  StreamKind stream   = 1;
  bool       keyframe = 2;
  int64      pts_us   = 3;  // AV_TIME_BASE_Q microseconds, shared clock for both streams
}

// The most recent cached video keyframe, sent once after Hello to a newly
// connected consumer so it can render immediately instead of waiting a GOP. As
// with Media, the keyframe bytes are the wire unit's trailing payload.
message Keyframe {
  int64 pts_us = 1;
}

// Periodic per-consumer counters (default every 5 s).
message Stats {
  uint64 messages_sent    = 1;
  uint64 messages_dropped = 2;  // dropped for THIS consumer
}

// The worker is shutting the stream down; the socket close that follows is not
// an error.
message Bye {
  string reason = 1;
}

// ---------------------------------------------------------------------------
// Monitor lifecycle / analysis / detection push channel (stream = MONITOR).
// Independent of media: it flows even while the camera is disconnected. A
// SNAPSHOT is delivered to every consumer on connect and refreshed on every
// health/state change, so a late subscriber learns current status immediately.
// ---------------------------------------------------------------------------
message Event {
  enum Code {
    CODE_UNSPECIFIED       = 0;
    SNAPSHOT               = 1;  // current health + state, sent on connect
    CONNECTION_FAILED      = 2;  // camera connect failed
    CONNECTION_RESTORED    = 3;
    PRIME_CAPTURE_FAILED   = 4;  // could not prime the capture source
    PRIME_CAPTURE_RESTORED = 5;
    CAPTURE_FAILED         = 6;  // pre/capture/post capture failed
    CAPTURE_RESUMED        = 7;  // pipeline recovered after any fault
    STATE_CHANGED          = 8;  // analysis state transition
    DETECTION              = 9;  // motion / AI detections (Phase 3)
    DESCRIPTION            = 10; // VLM natural-language scene understanding
  }

  Code   code          = 1;
  int64  wall_clock_us = 2;  // unix-epoch microseconds — the timestamp to surface
  string message       = 3;  // human-readable detail
  uint32 state_id      = 4;  // current monitor state
  uint32 prev_state_id = 5;  // previous state (STATE_CHANGED)
  uint32 detail        = 6;  // errno / ffmpeg error code
  string state_name    = 7;  // "IDLE" / "ALARM" / ...
  uint32 health_code   = 8;  // active fault code in a snapshot; 0 = healthy

  Detection   detection   = 9;   // set when code == DETECTION
  Description description = 10;   // set when code == DESCRIPTION
}

// Natural-language scene understanding from a VLM (e.g. "a person is leaving a
// package at the front door"). Produced on a trigger, not per-frame.
message Description {
  string text   = 1;  // the model's answer
  string prompt = 2;  // the question/instruction asked
  string model  = 3;  // which VLM produced it
}

message Detection {
  int64           frame_pts_us = 1;
  repeated Object objects      = 2;
}

message Object {
  string label      = 1;  // "person", "car", ...
  float  confidence = 2;
  // Bounding box in source-frame pixels.
  uint32 x          = 3;
  uint32 y          = 4;
  uint32 w          = 5;
  uint32 h          = 6;
  uint64 track_id   = 7;  // 0 = untracked
  uint32 zone_id    = 8;  // originating zone, 0 = none
}

// ---------------------------------------------------------------------------
// Client -> server control half.
// ---------------------------------------------------------------------------

// Select which streams the worker should push to this consumer. A record-only
// or events-only consumer leaves video/audio false, so the worker does no media
// fan-out work for it.
message Subscribe {
  bool video  = 1;
  bool audio  = 2;
  bool events = 3;  // SNAPSHOT + lifecycle/detection events
}

// A control request, answered by a Response carrying the same request_id.
message Command {
  uint64 request_id = 1;
  string name       = 2;  // "stop" | "reload" | "status" | "snapshot" | "record" | "ptz"
  // Open-ended arguments as JSON, so new commands don't churn the schema.
  string args_json  = 3;
}

// Answer to a Command.
message Response {
  uint64 request_id = 1;
  bool   ok         = 2;
  string message    = 3;
  string data_json  = 4;  // optional structured result
}

// Two-way audio (talkback): client -> server -> camera speaker. The worker
// relays this to the camera's audio backchannel (ONVIF Profile T RTSP
// backchannel, owned by the capture plugin). `codec` is an AVCodecID (commonly
// PCMA/PCMU G.711, sometimes AAC/Opus); `data` is one encoded audio chunk.
message Talkback {
  uint32 codec  = 1;
  int64  pts_us = 2;
  bytes  data   = 3;
}
